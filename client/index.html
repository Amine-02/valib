<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <script type="module" src="/src/main.js"></script>
    <title>Valib</title>
  </head>

  <body class="h-dvh min-h-svh overflow-hidden">
    <div id="app" class="flex h-full min-h-full flex-col">
      <div id="header"></div>

      <div id="content" class="flex min-h-0 flex-1 pt-14 lg:pt-16">
        <div id="sidebar" class="hidden"></div>
        <div id="view-dashboard" class="page-view hidden w-full flex-1 overflow-y-auto"></div>
        <div id="view-books" class="page-view hidden w-full flex-1 overflow-y-auto"></div>
        <div id="view-transactions" class="page-view hidden w-full flex-1 overflow-y-auto"></div>
        <div id="view-users" class="page-view hidden w-full flex-1 overflow-y-auto"></div>
        <div id="view-404" class="page-view hidden w-full flex-1 overflow-y-auto">
          <div class="flex min-h-full flex-col items-center justify-center space-y-6 text-center">
            <span
              class="bg-linear-to-r from-blue-500 to-red-500 bg-clip-text text-[18vw] leading-none font-extrabold text-transparent drop-shadow-sm sm:text-[16vw] md:text-[14vw]">
              404
            </span>

            <p class="text-xl font-semibold tracking-tight text-blue-900 sm:text-3xl lg:text-5xl">Page not found</p>

            <a
              href="/app"
              class="mt-4 transform rounded-lg bg-blue-600 px-6 py-3 text-lg font-medium text-white transition hover:bg-blue-700 active:scale-95">
              Back to home
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
