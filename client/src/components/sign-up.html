<section class="page-shell flex min-h-full items-center justify-center p-4 md:p-6">
  <div class="dashboard-shell w-full max-w-xl space-y-6">
    <header class="space-y-1 text-center">
      <h1 class="section-title">Complete sign up</h1>
      <p id="sign-up-subtitle" class="section-subtitle">
        Use your invite link, set your password, and finish your profile.
      </p>
    </header>

    <form id="sign-up-form" class="space-y-4" novalidate>
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div class="space-y-1.5 sm:col-span-2">
          <label for="sign-up-email" class="text-text text-sm font-semibold">Email</label>
          <input
            id="sign-up-email"
            type="email"
            autocomplete="email"
            required
            class="border-border bg-surface text-text placeholder:text-text-soft focus:border-primary-400 focus:ring-primary-200 w-full rounded-xl border px-3 py-2 text-sm focus:ring-2"
            placeholder="Invite email address" />
        </div>

        <div id="sign-up-password-field" class="space-y-1.5">
          <label for="sign-up-password" class="text-text text-sm font-semibold">Password</label>
          <input
            id="sign-up-password"
            type="password"
            autocomplete="new-password"
            class="border-border bg-surface text-text placeholder:text-text-soft focus:border-primary-400 focus:ring-primary-200 w-full rounded-xl border px-3 py-2 text-sm focus:ring-2"
            placeholder="Create password" />
        </div>

        <div id="sign-up-password-confirm-field" class="space-y-1.5">
          <label for="sign-up-password-confirm" class="text-text text-sm font-semibold">Retype password</label>
          <input
            id="sign-up-password-confirm"
            type="password"
            autocomplete="new-password"
            class="border-border bg-surface text-text placeholder:text-text-soft focus:border-primary-400 focus:ring-primary-200 w-full rounded-xl border px-3 py-2 text-sm focus:ring-2"
            placeholder="Retype password" />
        </div>

        <div class="space-y-1.5">
          <label for="sign-up-full-name" class="text-text text-sm font-semibold">Full name</label>
          <input
            id="sign-up-full-name"
            type="text"
            autocomplete="name"
            required
            class="border-border bg-surface text-text placeholder:text-text-soft focus:border-primary-400 focus:ring-primary-200 w-full rounded-xl border px-3 py-2 text-sm focus:ring-2"
            placeholder="Your full name" />
        </div>

        <div class="space-y-1.5">
          <label for="sign-up-phone" class="text-text text-sm font-semibold">Phone number</label>
          <input
            id="sign-up-phone"
            type="tel"
            autocomplete="tel"
            required
            class="border-border bg-surface text-text placeholder:text-text-soft focus:border-primary-400 focus:ring-primary-200 w-full rounded-xl border px-3 py-2 text-sm focus:ring-2"
            placeholder="(514) 123-4567" />
        </div>
      </div>

      <p id="sign-up-feedback" class="hidden text-sm text-center font-medium"></p>

      <button
        id="sign-up-google-link"
        type="button"
        class="btn-secondary w-full py-2.5 text-sm font-semibold">
        Link Google account
      </button>

      <div class="flex flex-col gap-2 sm:flex-row sm:justify-end">
        <a
          href="/app/sign-in"
          data-route="sign-in"
          class="btn-secondary inline-flex items-center justify-center px-4 py-2.5 text-sm font-semibold">
          Back to sign in
        </a>
        <button id="sign-up-submit" type="submit" class="btn-primary px-4 py-2.5 text-sm font-semibold">
          Complete sign up
        </button>
      </div>
    </form>
  </div>
</section>
