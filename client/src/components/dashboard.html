<section class="page-shell p-4 md:p-6">
  <div class="dashboard-shell mx-auto max-w-7xl space-y-6 md:space-y-7">
    <header class="space-y-1">
      <h1 class="section-title">Overview</h1>
      <p class="section-subtitle">Welcome back. Here is a quick summary of today&apos;s library activity.</p>
    </header>

    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
      <article class="stat-card stat-card--books space-y-3">
        <div class="flex items-center justify-between">
          <p class="text-text-muted text-sm font-semibold">Total books</p>
          <span class="rounded-lg bg-white p-2">
            <svg
              class="text-primary-700 h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              aria-hidden="true">
              <path
                d="M6 4.5h9a3 3 0 0 1 3 3V20l-4-2-4 2V7.5a3 3 0 0 0-3-3Z"
                stroke-linecap="round"
                stroke-linejoin="round" />
              <path d="M6 4.5a3 3 0 0 0 0 6h4" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
        </div>
        <p class="text-text text-4xl font-bold tracking-tight"></p>
      </article>

      <article class="stat-card stat-card--checked space-y-3">
        <div class="flex items-center justify-between">
          <p class="text-text-muted text-sm font-semibold">Checked out books</p>
          <span class="rounded-lg bg-white p-2">
            <svg
              class="h-5 w-5 text-amber-600"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              aria-hidden="true">
              <path
                d="M5 8.5A2.5 2.5 0 0 1 7.5 6h9A2.5 2.5 0 0 1 19 8.5v7a2.5 2.5 0 0 1-2.5 2.5h-9A2.5 2.5 0 0 1 5 15.5v-7Z"
                stroke-linecap="round"
                stroke-linejoin="round" />
              <path d="M10 12h4m-2-2v4" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
        </div>
        <p class="text-text text-4xl font-bold tracking-tight"></p>
      </article>

      <article class="stat-card stat-card--overdue space-y-3">
        <div class="flex items-center justify-between">
          <p class="text-text-muted text-sm font-semibold">Overdue books</p>
          <span class="rounded-lg bg-white p-2">
            <svg
              class="h-5 w-5 text-red-600"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              aria-hidden="true">
              <path d="M12 8v5l3 2m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
        </div>
        <p class="text-text text-4xl font-bold tracking-tight"></p>
      </article>

      <article class="stat-card stat-card--users space-y-3">
        <div class="flex items-center justify-between">
          <p class="text-text-muted text-sm font-semibold">Number of users</p>
          <span class="rounded-lg bg-white p-2">
            <svg
              class="text-primary-600 h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              aria-hidden="true">
              <path
                d="M15 19a4 4 0 0 0-8 0m14 0a4 4 0 0 0-5-3.87M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm10 8v-.5a3.5 3.5 0 0 0-3-3.46M16.5 7a3.5 3.5 0 0 1 0 7"
                stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </span>
        </div>
        <p class="text-text text-4xl font-bold tracking-tight"></p>
      </article>
    </div>

    <div class="grid grid-cols-1 gap-4 xl:grid-cols-2">
      <article class="card">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-text text-xl font-bold">Recent activity</h2>
          <a
            href="/app/activties"
            data-route="activties"
            class="text-primary-700 hover:text-primary-800 text-sm font-semibold">
            View all
          </a>
        </div>

        <ul role="list" class="max-h-100 space-y-4 overflow-y-auto pr-2"></ul>
      </article>

      <article class="card">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-text text-xl font-bold">Popular books</h2>
          <a href="/app/books" data-route="books" class="text-primary-700 hover:text-primary-800 text-sm font-semibold">
            View all
          </a>
        </div>

        <ul role="list" class="max-h-100 space-y-4 overflow-y-auto pr-2"></ul>
      </article>
    </div>
  </div>
</section>
