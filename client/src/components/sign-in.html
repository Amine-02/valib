<section class="page-shell flex min-h-full items-center justify-center p-4 md:p-6">
  <div class="dashboard-shell w-full max-w-md space-y-6">
    <header class="space-y-1 text-center">
      <h1 class="section-title">Sign in</h1>
      <p class="section-subtitle">Access your library workspace.</p>
    </header>

    <form id="sign-in-form" class="space-y-4" novalidate>
      <div class="space-y-1.5">
        <label for="sign-in-email" class="text-text text-sm font-semibold">Email</label>
        <input
          id="sign-in-email"
          type="email"
          autocomplete="email"
          required
          class="border-border bg-surface text-text placeholder:text-text-soft focus:border-primary-400 focus:ring-primary-200 w-full rounded-xl border px-3 py-2 text-sm focus:ring-2"
          placeholder="you@example.com" />
      </div>

      <div class="space-y-1.5">
        <label for="sign-in-password" class="text-text text-sm font-semibold">Password</label>
        <input
          id="sign-in-password"
          type="password"
          autocomplete="current-password"
          required
          class="border-border bg-surface text-text placeholder:text-text-soft focus:border-primary-400 focus:ring-primary-200 w-full rounded-xl border px-3 py-2 text-sm focus:ring-2"
          placeholder="Enter your password" />
      </div>

      <p id="sign-in-feedback" class="hidden text-center text-sm font-medium"></p>

      <button id="sign-in-submit" type="submit" class="btn-primary w-full py-2.5 text-sm font-semibold">Sign in</button>
      <button id="sign-in-google" type="button" class="btn-secondary w-full py-2.5 text-sm font-semibold">
        Continue with Google
      </button>
    </form>

    <p class="text-text-soft text-center text-xs">
      Need access? Ask an admin to send you an invite email.
      <a
        href="/app/sign-up"
        data-route="sign-up"
        class="text-primary-700 hover:text-primary-800 decoration-primary-200 mt-1 block font-semibold underline underline-offset-2">
        Complete invite sign up
      </a>
    </p>
  </div>
</section>
