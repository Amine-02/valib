<header id="header" class="topbar fixed top-0 left-0 z-50 flex h-16 w-full items-center justify-center px-4 shadow-sm">
  <button
    id="sidebar-toggle"
    class="text-primary-700 hover:bg-primary-50 absolute left-4 inline-flex h-10 w-10 items-center justify-center rounded-xl transition active:scale-95"
    aria-label="Toggle sidebar">
    <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <a
    id="logo-link"
    href="/"
    class="inline-flex items-center rounded-sm px-3 py-2 transition active:scale-95">
    <img src="/assets/valib_logo.png" alt="Valib logo" class="h-10 w-auto object-contain" />
  </a>

  <a
    href="/app/sign-in"
    data-route="sign-in"
    id="auth-link"
    class="bg-primary-50 text-primary-700 hover:bg-primary-100 absolute right-4 inline-flex items-center justify-center gap-2 rounded-xl px-4 py-2 text-sm font-semibold transition active:scale-95"
    aria-label="Sign in">
    <span id="auth-text">Sign in</span>

    <svg
      id="auth-profile"
      class="hidden h-5 w-5"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M20 21a8 8 0 1 0-16 0" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
    </svg>
  </a>

  <div id="header-user-root" class="absolute right-4 hidden">
    <button
      id="header-user-trigger"
      type="button"
      aria-haspopup="menu"
      aria-expanded="false"
      class="bg-primary-50 text-primary-700 hover:bg-primary-100 inline-flex h-10 w-10 items-center justify-center rounded-full transition active:scale-95"
      title="Account">
      <span class="bg-primary-100 text-primary-700 inline-flex h-9 w-9 items-center justify-center rounded-full">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 21a8 8 0 1 0-16 0" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
        </svg>
      </span>
    </button>

    <div
      id="header-user-dropdown"
      role="menu"
      class="border-border bg-surface absolute top-12 right-0 hidden w-72 rounded-2xl border p-4 shadow-xl">
      <h3 class="text-text text-sm font-semibold">Account</h3>

      <div class="mt-3 space-y-2 text-sm">
        <div>
          <p class="text-text-muted text-xs font-medium tracking-wide uppercase">Full name</p>
          <p id="header-user-full-name" class="text-text mt-0.5 font-medium">N/A</p>
        </div>
        <div>
          <p class="text-text-muted text-xs font-medium tracking-wide uppercase">Email</p>
          <p id="header-user-email" class="text-text mt-0.5 font-medium">N/A</p>
        </div>
        <div>
          <p class="text-text-muted text-xs font-medium tracking-wide uppercase">Phone</p>
          <p id="header-user-phone" class="text-text mt-0.5 font-medium">N/A</p>
        </div>
        <div>
          <p class="text-text-muted text-xs font-medium tracking-wide uppercase">Role</p>
          <p id="header-user-role" class="text-text mt-0.5 font-medium">N/A</p>
        </div>
      </div>

      <button
        id="header-user-logout"
        type="button"
        role="menuitem"
        class="btn-secondary mt-4 w-full py-2 text-sm font-semibold">
        Log out
      </button>
    </div>
  </div>
</header>
