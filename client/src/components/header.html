<header id="header" class="topbar fixed top-0 left-0 z-50 flex h-16 w-full items-center justify-center px-4 shadow-sm">
  <button
    id="sidebar-toggle"
    class="text-primary-700 hover:bg-primary-50 absolute left-4 inline-flex h-10 w-10 items-center justify-center rounded-xl transition active:scale-95"
    aria-label="Toggle sidebar">
    <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <a
    id="logo-link"
    href="/"
    class="hover:bg-primary-50 inline-flex items-center gap-3 rounded-xl px-3 py-2 transition active:scale-95">
    <div class="bg-primary-100 text-primary-700 flex h-10 w-10 items-center justify-center rounded-xl shadow-sm">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M4 6.5C4 5.12 5.12 4 6.5 4H20v13.5c0 1.38-1.12 2.5-2.5 2.5H6.5A2.5 2.5 0 0 1 4 17.5v-11Z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 8h8M8 12h8M8 16h5" />
      </svg>
    </div>

    <div class="text-left">
      <span class="text-text block text-lg font-bold tracking-tight">Valib</span>
      <span class="text-text-muted block text-xs">Library Management</span>
    </div>
  </a>

  <a
    href="/app/sign-in"
    data-route="sign-in"
    id="auth-link"
    class="bg-primary-50 text-primary-700 hover:bg-primary-100 absolute right-4 inline-flex items-center justify-center gap-2 rounded-xl px-4 py-2 text-sm font-semibold transition active:scale-95"
    aria-label="Sign in">
    <span id="auth-text">Sign in</span>

    <svg
      id="auth-profile"
      class="hidden h-5 w-5"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M20 21a8 8 0 1 0-16 0" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
    </svg>
  </a>
</header>
